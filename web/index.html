<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Portfolio of Harshil Sutariya, a Flutter Developer.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Harshil">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Disable Zoom -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Harshil Sutariya | Flutter Developer</title>
  <link rel="manifest" href="manifest.json">
  
  <style>
    /* Disable selection */
    body {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <script>
    // Disable Right Click
    document.addEventListener('contextmenu', event => event.preventDefault());

    // Disable Inspect Element & Shortcuts
    document.onkeydown = function(e) {
      if(event.keyCode == 123) { // F12
        return false;
      }
      if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { // Ctrl+Shift+I
        return false;
      }
      if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { // Ctrl+Shift+J
        return false;
      }
      if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { // Ctrl+U
        return false;
      }
      // Mac specific
      if(e.metaKey && e.altKey && e.keyCode == 'I'.charCodeAt(0)) { // Cmd+Opt+I
        return false;
      }
      if(e.metaKey && e.altKey && e.keyCode == 'J'.charCodeAt(0)) { // Cmd+Opt+J
        return false;
      }
      if(e.metaKey && e.keyCode == 'U'.charCodeAt(0)) { // Cmd+U
        return false;
      }
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
